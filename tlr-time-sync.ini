[server]
# Root URL of your TLR server (no trailing slash)
url = https://your-tlr-server-url.com

[sync]
# How often to sync, in seconds (minimum 10)
interval_seconds = 30

# How many samples to take per sync cycle — picks the one with the lowest RTT.
# More samples = more accurate but slightly more server load (max 10).
samples = 4

# How many consecutive failures before the program warns and backs off
failure_threshold = 5
